<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find a Ride — Campus Rideshare</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
  </head>
  <body>
    <nav class="navbar solid" id="navbar">
      <div class="container nav-inner">
        <a href="index.html" class="nav-logo">
          <div class="nav-logo-icon">
            <svg class="icon icon-md"><use href="assets/icons.svg#icon-car"></use></svg>
          </div>
          CampusRide
        </a>
        <div class="nav-links" id="navLinks">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="find-ride.html" class="nav-link active">Find a Ride</a>
          <a href="create-ride.html" class="nav-link">Post a Ride</a>
          <a href="ai-assistant.html" class="nav-link">AI Assistant</a>
        </div>
        <div class="nav-actions">
          <a href="profile.html" class="nav-avatar" id="navAvatar"></a>
          <button class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </nav>

    <div class="page-body">
      <!-- Hero Search -->
      <div class="find-ride-hero">
        <div class="container">
          <p class="section-eyebrow gold-light">Search Rides</p>
          <h1 class="page-title white">Find Your Perfect Ride</h1>

          <div class="search-bar">
            <div class="form-group mb-0">
              <label class="form-label">From</label>
              <div class="input-wrapper">
                <span class="input-icon"><svg class="icon icon-md"><use href="assets/icons.svg#icon-map-pin"></use></svg></span>
                <input type="text" class="form-input" placeholder="Campus / University" id="searchFrom" />
              </div>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">To</label>
              <div class="input-wrapper">
                <span class="input-icon"><svg class="icon icon-md"><use href="assets/icons.svg#icon-flag"></use></svg></span>
                <input type="text" class="form-input" placeholder="Destination" id="searchTo" />
              </div>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Date</label>
              <div class="input-wrapper">
                <span class="input-icon"><svg class="icon icon-md"><use href="assets/icons.svg#icon-calendar"></use></svg></span>
                <input type="date" class="form-input" id="searchDate" />
              </div>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Seats</label>
              <select class="form-select" id="searchSeats">
                <option value="1">1 seat</option>
                <option value="2">2 seats</option>
                <option value="3">3 seats</option>
                <option value="4">4 seats</option>
              </select>
            </div>
            <button class="btn btn-primary btn-lg" id="searchBtn">
              <svg class="icon icon-md"><use href="assets/icons.svg#icon-search"></use></svg>
              Search
            </button>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="container section-padding">
        <div class="find-ride-layout">
          <!-- Filters Panel -->
          <aside class="filters-panel">
            <div class="filters-header">
              <h3 class="filters-title">Filters</h3>
              <button class="btn btn-ghost btn-sm" id="clearFilters">Clear all</button>
            </div>

            <div class="form-group">
              <label class="form-label">Max Price (KSh)</label>
              <input type="range" min="100" max="2000" value="1000" class="form-range" id="priceRange" />
              <div class="flex-between mt-1">
                <span class="price-hint">KSh 100</span>
                <span class="price-hint bold" id="priceValue">KSh 1,000</span>
                <span class="price-hint">KSh 2,000</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Departure Time</label>
              <div class="form-check-group">
                <label class="form-check">
                  <input type="checkbox" name="timeFilter" value="morning" checked />
                  <span class="form-check-label">Morning (6 AM &ndash; 12 PM)</span>
                </label>
                <label class="form-check">
                  <input type="checkbox" name="timeFilter" value="afternoon" checked />
                  <span class="form-check-label">Afternoon (12 PM &ndash; 6 PM)</span>
                </label>
                <label class="form-check">
                  <input type="checkbox" name="timeFilter" value="evening" />
                  <span class="form-check-label">Evening (6 PM &ndash; 12 AM)</span>
                </label>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Minimum Driver Rating</label>
              <select class="form-select" id="minRating">
                <option value="0">Any rating</option>
                <option value="3">3+ stars</option>
                <option value="4" selected>4+ stars</option>
                <option value="4.5">4.5+ stars</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Seats Available</label>
              <select class="form-select" id="seatsFilter">
                <option value="0">Any</option>
                <option value="1">At least 1</option>
                <option value="2">At least 2</option>
                <option value="3">At least 3</option>
              </select>
            </div>

            <label class="form-check mt-2">
              <input type="checkbox" id="verifiedOnly" checked />
              <span class="form-check-label">
                <svg class="icon icon-sm"><use href="assets/icons.svg#icon-shield"></use></svg>
                Verified drivers only
              </span>
            </label>

            <button class="btn btn-primary btn-block mt-6" id="applyFilters">Apply Filters</button>
          </aside>

          <!-- Rides List -->
          <div>
            <div class="flex-between mb-4">
              <p class="rides-count" id="ridesCount">Searching&hellip;</p>
              <select class="form-select form-select-auto" id="sortBy">
                <option value="price">Sort by: Price</option>
                <option value="time">Sort by: Departure Time</option>
                <option value="rating">Sort by: Driver Rating</option>
              </select>
            </div>

            <div class="rides-grid" id="ridesGrid">
              <!-- Populated by findRide.js -->
              <div class="empty-state">
                <svg class="icon icon-3xl"><use href="assets/icons.svg#icon-search"></use></svg>
                <h3>Search for rides</h3>
                <p>Enter your route above to find available rides.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/findRide.js"></script>
  </body>
</html>
