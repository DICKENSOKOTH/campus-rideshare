<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant — Campus Rideshare</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body class="overflow-hidden">

  <!-- NAVBAR -->
  <nav class="navbar solid" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">
          <svg class="icon icon-md"><use href="assets/icons.svg#icon-car"></use></svg>
        </div>
        CampusRide
      </a>
      <div class="nav-links" id="navLinks">
        <a href="dashboard.html"    class="nav-link">Dashboard</a>
        <a href="find-ride.html"    class="nav-link">Find a Ride</a>
        <a href="create-ride.html"  class="nav-link">Post a Ride</a>
        <a href="ai-assistant.html" class="nav-link active">AI Assistant</a>
      </div>
      <div class="nav-actions">
        <a href="profile.html" class="nav-avatar" id="navAvatar"></a>
        <button class="nav-toggle" id="navToggle">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- AI PAGE -->
  <div class="ai-page ai-page-offset">

    <!-- LEFT SIDEBAR -->
    <aside class="ai-sidebar">
      <div class="ai-sidebar-header">
        <div class="ai-sidebar-title">
          <div class="ai-dot"></div>
          Campus Rideshare AI
        </div>
        <button class="btn btn-primary btn-sm btn-block mt-3" id="newChatBtn">
          <svg class="icon icon-sm"><use href="assets/icons.svg#icon-plus"></use></svg>
          New Chat
        </button>
      </div>

      <div class="chat-history" id="chatHistory">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- MAIN CHAT AREA -->
    <div class="ai-main">

      <!-- Chat Header -->
      <div class="ai-chat-header">
        <div class="ai-avatar">
          <svg class="icon icon-md gold-light"><use href="assets/icons.svg#icon-sparkle"></use></svg>
        </div>
        <div class="ai-chat-header-info">
          <div class="ai-chat-header-title">Campus Rideshare AI Assistant</div>
          <div class="ai-status">Online — Ready to help</div>
        </div>
        <button class="btn btn-sm btn-ghost" id="clearChatBtn">
          <svg class="icon icon-sm"><use href="assets/icons.svg#icon-trash"></use></svg>
          Clear
        </button>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages">
        <!-- Populated by JS -->
        <div class="typing-indicator hidden" id="typingIndicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="chat-input-area">
        <div class="quick-prompts" id="quickActionsContainer">
          <!-- Populated by JS -->
        </div>
        <form id="chatForm" class="chat-input-form">
          <textarea id="messageInput" placeholder="Ask me anything about ridesharing..." rows="1"></textarea>
          <button type="submit" id="sendBtn" class="btn btn-primary" disabled>
            <svg class="icon icon-sm"><use href="assets/icons.svg#icon-send"></use></svg>
          </button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/aiAssistant.js"></script>
</body>
</html>
